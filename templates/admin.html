<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Archive</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container fade-in">

    <div class="logo">
        ONE LINE ARCHIVE
    </div>

    <div style="margin-bottom:20px; opacity:0.5;">
        {{ lines|length }} lines collected
    </div>

    {% for line in lines %}

        <div style="
            padding:22px;
            margin-bottom:18px;
            border-radius:18px;
            background:rgba(255,255,255,0.04);
            border:1px solid rgba(255,255,255,0.06);
        ">

            <div style="
                font-size:18px;
                line-height:1.7;
                margin-bottom:14px;
            ">
                “{{ line[1] }}”
            </div>

            <div style="
                opacity:0.45;
                font-size:13px;
            ">
                {{ line[2] }}
            </div>

        </div>

    {% endfor %}

    <a href="/logout" style="
        color:white;
        opacity:0.5;
        text-decoration:none;
    ">
        Logout
    </a>

</div>

</body>
</html>
